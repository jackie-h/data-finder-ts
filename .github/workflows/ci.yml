name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync

      - name: Install Node dependencies
        run: npm ci

      - name: Generate TypeScript finders (programmatic)
        run: npm run generate

      - name: Generate TypeScript finders (markdown)
        run: npm run generate:markdown

      - name: Generate TypeScript finders (dual association)
        run: npm run generate:dual-assoc

      - name: Generate TypeScript finders (self-referencing association)
        run: npm run generate:self-ref

      - name: Type-check TypeScript
        run: npm run build

      - name: Run tests
        run: npm test
